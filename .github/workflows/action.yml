name: Build Android APK

on:
  push:
    branches:
      - dhphuc
  workflow_dispatch: # Keeps the manual trigger option available

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    # Cấp quyền ghi vào mục Release của repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle' # Tự động cache các gói phụ thuộc Java/Gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Tối ưu cấu hình Gradle (Tăng RAM)
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.parallel=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m" >> ~/.gradle/gradle.properties
          echo "org.gradle.caching=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.workers.max=2" >> ~/.gradle/gradle.properties

      - name: Build Android Release & Debug APK (arm64-v8a)
        run: |
          cd android
          ./gradlew assembleRelease \
          -PreactNativeArchitectures=arm64-v8a \
          -x lint -x test \
          -x lintVitalRelease -x lintVitalAnalyzeRelease -x lintVitalReportRelease \
          --no-daemon

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-apks
          path: |
            android/app/build/outputs/apk/release/*.apk
          retention-days: 7

      # Cập nhật đè / Khởi tạo bản Prerelease lên GitHub Releases cho Android
      - name: Create or Update Pre-release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/debug/*.apk
          tag: "dhphuc-android"
          name: "${{ github.sha }}"
          body: |
            ### 🤖 Android Build Details
            - **Commit SHA:** `${{ github.sha }}`
            - **Branch:** `${{ github.ref_name }}`
            
            Tải trực tiếp file APK (Release & Debug arm64-v8a) ở phần **Assets** bên dưới để cài đặt.
          prerelease: true
          makeLatest: false
          token: ${{ secrets.GITHUB_TOKEN }}
          
