name: Build Android AAB

on:
  workflow_dispatch: # Keeps the manual trigger option available

jobs:
  build-android:
    name: Build Android AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle' # Tự động cache các gói phụ thuộc Java/Gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Tối ưu cấu hình Gradle (Tăng RAM & Chạy song song)
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.parallel=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> ~/.gradle/gradle.properties
          echo "org.gradle.caching=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.configureondemand=true" >> ~/.gradle/gradle.properties

      - name: Build Android Release AAB (Tất cả kiến trúc chip)
        run: |
          cd android
          # Đổi từ assembleRelease sang bundleRelease và bỏ flag giới hạn architect
          ./gradlew bundleRelease

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          # Đường dẫn đầu ra của file .aab sau khi build xong
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 7
