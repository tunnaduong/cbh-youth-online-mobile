name: Build iOS Simulator

on:
  push:
    tags:
      - 'dhphuc-ios'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios-simulator:
    name: Build iOS Simulator App
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure Node path for Xcode build phases
        run: |
          sudo ln -sf $(which node) /usr/local/bin/node
          echo "export NODE_BINARY=$(which node)" > ios/.xcode.env.local

      - name: Install dependencies
        run: npm ci

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Detect iOS Project Name
        run: |
          cd ios
          WORKSPACE_NAME=$(basename *.xcworkspace .xcworkspace)
          echo "APP_NAME=$WORKSPACE_NAME" >> $GITHUB_ENV

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build iOS Simulator App (Release Configuration)
        run: |
          cd ios
          set -o pipefail
          xcodebuild -workspace "${{ env.APP_NAME }}.xcworkspace" \
            -scheme "${{ env.APP_NAME }}" \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/simulator_derived_data" \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --quiet --renderer github-actions

      - name: Compress Simulator .app File
        run: |
          cd "$RUNNER_TEMP/simulator_derived_data/Build/Products/Release-iphonesimulator"
          zip -r "$RUNNER_TEMP/${{ env.APP_NAME }}-simulator.zip" "${{ env.APP_NAME }}.app"

      - name: Upload Binaries to Release (Overwrite Enabled)
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/*-simulator.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Simulator Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-simulator-zip
          path: ${{ runner.temp }}/*-simulator.zip
          retention-days: 7
