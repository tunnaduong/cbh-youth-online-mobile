name: Build iOS Unsigned IPA

on:
  push:
    branches:
      - dhphuc
  workflow_dispatch: # Keeps the manual trigger option available

jobs:
  build-ios:
    name: Build iOS Unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Build Unsigned iOS Archive
        run: |
          cd ios
          
          # Build the archive without signing
          xcodebuild clean archive \
            -workspace YourProjectName.xcworkspace \
            -scheme YourProjectName \
            -configuration Release \
            -archivePath $RUNNER_TEMP/YourProjectName.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package .xcarchive into Unsigned .ipa
        run: |
          # Create the required Payload directory structure for an IPA
          mkdir -p $RUNNER_TEMP/Payload
          
          # Copy the compiled .app bundle into the Payload folder
          cp -r $RUNNER_TEMP/YourProjectName.xcarchive/Products/Applications/*.app $RUNNER_TEMP/Payload/
          
          # Zip the Payload folder into an .ipa file
          cd $RUNNER_TEMP
          zip -r YourProjectName-unsigned.ipa Payload

      - name: Upload Unsigned IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned-ipa
          path: ${{ runner.temp }}/YourProjectName-unsigned.ipa
          retention-days: 7
