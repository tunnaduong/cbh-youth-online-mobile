name: Build iOS Signed IPA

on:
  push:
    branches:
      - dhphuc
  workflow_dispatch:

jobs:
  build-ios:
    name: Build & Sign iOS IPA
    runs-on: macos-latest
    
    # Cấp quyền ghi vào mục Release của repo trực tiếp trong code workflow
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Đảm bảo sử dụng Xcode 26 theo cấu hình hệ thống của bạn
      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0' 

      # Cài đặt môi trường Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure Node path for Xcode build phases
        run: |
          sudo ln -sf $(which node) /usr/local/bin/node
          echo "export NODE_BINARY=$(which node)" > ios/.xcode.env.local

      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISIONING_PROFILE_BASE64: ${{ secrets.BUILD_PROVISIONING_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-build.keychain-db

          # Giải mã dữ liệu từ Secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Tạo keychain tạm thời
          security create-keychain -p "github-actions-pwd" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "github-actions-pwd" $KEYCHAIN_PATH

          # Thêm keychain vào danh sách tìm kiếm hệ thống để xcodebuild có thể nhìn thấy Cert
          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | tr -d '"')
          security default-keychain -s $KEYCHAIN_PATH

          # Import Certificate vào keychain
          security import $CERTIFICATE_PATH \
            -k $KEYCHAIN_PATH \
            -P "$P12_PASSWORD" \
            -t cert \
            -f pkcs12 \
            -A

          # Cấp quyền phân vùng tránh hiển thị popup GUI hỏi mật khẩu khi build
          security set-key-partition-list -S apple-tool:,apple: -s -k "github-actions-pwd" $KEYCHAIN_PATH

          # Đưa Provisioning Profile vào đúng vị trí thư mục của Xcode
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

          # Trích xuất thông tin tự động từ Provisioning Profile để ghi vào môi trường GITHUB_ENV
          security cms -D -i $PP_PATH > $RUNNER_TEMP/profile.plist
          TEAM_ID=$(plutil -extract TeamIdentifier.0 raw $RUNNER_TEMP/profile.plist || plutil -extract Entitlements.com.apple.developer.team-identifier raw $RUNNER_TEMP/profile.plist)
          UUID=$(plutil -extract UUID raw $RUNNER_TEMP/profile.plist)
          PROFILE_NAME=$(plutil -extract Name raw $RUNNER_TEMP/profile.plist)
          FULL_APP_ID=$(plutil -extract Entitlements.application-identifier raw $RUNNER_TEMP/profile.plist)
          BUNDLE_ID="${FULL_APP_ID#*.}"
          if [ "$BUNDLE_ID" = "*" ]; then
            BUNDLE_ID="com.fatties.youth"
          fi

          echo "DEVELOPMENT_TEAM=$TEAM_ID" >> $GITHUB_ENV
          echo "PROVISIONING_PROFILE_UUID=$UUID" >> $GITHUB_ENV
          echo "PROVISIONING_PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV
          echo "BUNDLE_ID=$BUNDLE_ID" >> $GITHUB_ENV

          echo "Successfully extracted signing info:"
          echo "Team ID: $TEAM_ID"
          echo "UUID: $UUID"
          echo "Profile Name: $PROFILE_NAME"
          echo "Bundle ID: $BUNDLE_ID"

      - name: Install dependencies
        run: npm ci

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Detect iOS Project Name
        id: detect_name
        run: |
          cd ios
          WORKSPACE_NAME=$(basename *.xcworkspace .xcworkspace)
          echo "APP_NAME=$WORKSPACE_NAME" >> $GITHUB_ENV

      - name: Install xcbeautify
        run: brew install xcbeautify

      # Ép Xcode dùng Manual Signing để sửa triệt để lỗi 65
      - name: Build iOS Archive
        run: |
          cd ios
          set -o pipefail
          xcodebuild clean archive \
            -workspace "${{ env.APP_NAME }}.xcworkspace" \
            -scheme "${{ env.APP_NAME }}" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/${{ env.APP_NAME }}.xcarchive" \
            DEVELOPMENT_TEAM="${{ env.DEVELOPMENT_TEAM }}" \
            CODE_SIGN_STYLE="Manual" \
            CODE_SIGN_IDENTITY="Apple Development" \
            PROVISIONING_PROFILE_SPECIFIER="${{ env.PROVISIONING_PROFILE_NAME }}" \
            PROVISIONING_PROFILE="${{ env.PROVISIONING_PROFILE_UUID }}" \
            | xcbeautify --quiet --renderer github-actions

      - name: Export IPA
        run: |
          cat <<EOF > $RUNNER_TEMP/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>compileBitcode</key>
              <false/>
              <key>destination</key>
              <string>export</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>${{ env.DEVELOPMENT_TEAM }}</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${{ env.BUNDLE_ID }}</key>
                  <string>${{ env.PROVISIONING_PROFILE_NAME }}</string>
              </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/${{ env.APP_NAME }}.xcarchive" \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/exported_ipa

          mv $RUNNER_TEMP/exported_ipa/*.ipa $RUNNER_TEMP/${{ env.APP_NAME }}-signed.ipa

      - name: Upload Signed IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed-ipa
          path: ${{ runner.temp }}/*-signed.ipa
          retention-days: 7

      # Tự động sinh file manifest và sinh mã QR tải trực tiếp qua OTA 
      - name: Generate and Host OTA Manifest
        id: ota_host
        run: |
          # Đường dẫn tải IPA cố định từ khu vực Release Asset của GitHub
          IPA_DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/dhphuc-ios/${{ env.APP_NAME }}-signed.ipa"
          
          # Cấu trúc tệp cấu hình cài đặt mạng không dây của Apple
          cat <<EOF > $RUNNER_TEMP/manifest.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>items</key>
              <array>
                  <key>assets</key>
                  <array>
                      <key>kind</key>
                      <string>software-package</string>
                      <key>url</key>
                      <string>$IPA_DOWNLOAD_URL</string>
                  </array>
              </array>
              <key>metadata</key>
              <dict>
                  <key>bundle-identifier</key>
                  <string>${{ env.BUNDLE_ID }}</string>
                  <key>bundle-version</key>
                  <string>1.0.0</string>
                  <key>kind</key>
                  <string>software</string>
                  <key>title</key>
                  <string>${{ env.APP_NAME }}</string>
              </dict>
          </dict>
          </plist>
          EOF

          # Upload file plist lên dịch vụ raw text an toàn không dính redirect
          RAW_PLIST_URL=$(curl -s --data-binary "@$RUNNER_TEMP/manifest.plist" https://paste.c-net.org/)
          
          if [ -z "$RAW_PLIST_URL" ]; then
            echo "Lỗi: Không thể khởi tạo dịch vụ lưu trữ manifest tạm thời."
            exit 1
          fi
          
          echo "Manifest RAW URL: $RAW_PLIST_URL"
          
          # Cú pháp kích hoạt trình tải iOS OTA dịch vụ itms
          OTA_INSTALL_URL="itms-services://?action=download-manifest&url=$RAW_PLIST_URL"
          
          # Sinh ảnh mã QR từ URL cài đặt 
          QR_IMAGE_URL="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=$(echo -n $OTA_INSTALL_URL | jq -rr @uri)"
          echo "OTA_QR_URL=$QR_IMAGE_URL" >> $GITHUB_ENV

      # Cập nhật đè / Khởi tạo bản Prerelease lên GitHub Releases 
      - name: Create or Update Pre-release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: "${{ runner.temp }}/*-signed.ipa"
          tag: "dhphuc-ios"
          name: "${{ github.sha }}"
          body: |
            ### 🚀 iOS Build Details
            - **Commit SHA:** `${{ github.sha }}`
            - **Branch:** `${{ github.ref_name }}`
            
            ### 📲 Scan QR to Install Directly (OTA)
            Mở ứng dụng Camera trên iPhone của bạn để quét mã này và tiến hành cài đặt ứng dụng trực tiếp:
            
            ![Scan to Install](${{ env.OTA_QR_URL }})
            
            *Lưu ý: Thiết bị nhận cần phải được nạp sẵn UDID vào Provisioning Profile (Ad-hoc / Dev Cert) hoặc cài qua các công cụ hỗ trợ bỏ qua sign như TrollStore.*
          prerelease: true
          makeLatest: false
          token: ${{ secrets.GITHUB_TOKEN }}
          
