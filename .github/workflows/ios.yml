name: Build iOS Signed IPA

on:
  push:
    branches:
      - dhphuc
  workflow_dispatch:

jobs:
  build-ios:
    name: Build & Sign iOS IPA
    runs-on: macos-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0' 

       Tar: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure Node path for Xcode build phases
        run: |
          sudo ln -sf $(which node) /usr/local/bin/node
          echo "export NODE_BINARY=$(which node)" > ios/.xcode.env.local

      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISIONING_PROFILE_BASE64: ${{ secrets.BUILD_PROVISIONING_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-build.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "github-actions-pwd" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "github-actions-pwd" $KEYCHAIN_PATH

          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | tr -d '"')
          security default-keychain -s $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH \
            -k $KEYCHAIN_PATH \
            -P "$P12_PASSWORD" \
            -t cert \
            -f pkcs12 \
            -A

          security set-key-partition-list -S apple-tool:,apple: -s -k "github-actions-pwd" $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

          security cms -D -i $PP_PATH > $RUNNER_TEMP/profile.plist
          TEAM_ID=$(plutil -extract TeamIdentifier.0 raw $RUNNER_TEMP/profile.plist || plutil -extract Entitlements.com.apple.developer.team-identifier raw $RUNNER_TEMP/profile.plist)
          UUID=$(plutil -extract UUID raw $RUNNER_TEMP/profile.plist)
          PROFILE_NAME=$(plutil -extract Name raw $RUNNER_TEMP/profile.plist)
          FULL_APP_ID=$(plutil -extract Entitlements.application-identifier raw $RUNNER_TEMP/profile.plist)
          BUNDLE_ID="${FULL_APP_ID#*.}"
          if [ "$BUNDLE_ID" = "*" ]; then
            BUNDLE_ID="com.fatties.youth"
          fi

          echo "DEVELOPMENT_TEAM=$TEAM_ID" >> $GITHUB_ENV
          echo "PROVISIONING_PROFILE_UUID=$UUID" >> $GITHUB_ENV
          echo "PROVISIONING_PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV
          echo "BUNDLE_ID=$BUNDLE_ID" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Detect iOS Project Name
        id: detect_name
        run: |
          cd ios
          WORKSPACE_NAME=$(basename *.xcworkspace .xcworkspace)
          echo "APP_NAME=$WORKSPACE_NAME" >> $GITHUB_ENV

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build iOS Archive
        run: |
          cd ios
          set -o pipefail
          xcodebuild clean archive \
            -workspace "${{ env.APP_NAME }}.xcworkspace" \
            -scheme "${{ env.APP_NAME }}" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/${{ env.APP_NAME }}.xcarchive" \
            DEVELOPMENT_TEAM="${{ env.DEVELOPMENT_TEAM }}" \
            CODE_SIGN_STYLE="Manual" \
            CODE_SIGN_IDENTITY="Apple Development" \
            PROVISIONING_PROFILE_SPECIFIER="${{ env.PROVISIONING_PROFILE_NAME }}" \
            PROVISIONING_PROFILE="${{ env.PROVISIONING_PROFILE_UUID }}" \
            | xcbeautify --quiet --renderer github-actions

      - name: Export IPA
        run: |
          cat <<EOF > $RUNNER_TEMP/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>compileBitcode</key>
              <false/>
              <key>destination</key>
              <string>export</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>${{ env.DEVELOPMENT_TEAM }}</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${{ env.BUNDLE_ID }}</key>
                  <string>${{ env.PROVISIONING_PROFILE_NAME }}</string>
              </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/${{ env.APP_NAME }}.xcarchive" \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/exported_ipa

          mv $RUNNER_TEMP/exported_ipa/*.ipa $RUNNER_TEMP/${{ env.APP_NAME }}-signed.ipa

      - name: Upload Signed IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed-ipa
          path: ${{ runner.temp }}/*-signed.ipa
          retention-days: 7

      # Tự sinh tệp cấu hình mạng và đóng gói tệp cài đặt HTML chính chủ
      - name: Generate OTA Files
        id: ota_process
        run: |
          # Định nghĩa URL cố định của IPA và HTML trên khu vực Release của GitHub
          IPA_DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/dhphuc-ios/${{ env.APP_NAME }}-signed.ipa"
          GITHUB_HTML_URL="https://github.com/${{ github.repository }}/releases/download/dhphuc-ios/install.html"
          
          # 1. Khởi tạo manifest.plist
          cat <<EOF > $RUNNER_TEMP/manifest.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>items</key>
              <array>
                  <key>assets</key>
                  <array>
                      <key>kind</key>
                      <string>software-package</string>
                      <key>url</key>
                      <string>$IPA_DOWNLOAD_URL</string>
                  </array>
              </array>
              <key>metadata</key>
              <dict>
                  <key>bundle-identifier</key>
                  <string>${{ env.BUNDLE_ID }}</string>
                  <key>bundle-version</key>
                  <string>1.0.0</string>
                  <key>kind</key>
                  <string>software</string>
                  <key>title</key>
                  <string>${{ env.APP_NAME }}</string>
              </dict>
          </dict>
          </plist>
          EOF

          # Đẩy manifest.plist lên paste service (Lưu ý: itms bắt buộc đọc từ raw link không redirect)
          RAW_PLIST_URL=$(curl -s --data-binary "@$RUNNER_TEMP/manifest.plist" https://paste.c-net.org/ | tr -d '\r\n[:space:]')
          if [ -z "$RAW_PLIST_URL" ] || [[ "$RAW_PLIST_URL" != http* ]]; then
            RAW_PLIST_URL=$(curl -s -F 'f:1=@'$RUNNER_TEMP/manifest.plist ix.io | tr -d '\r\n[:space:]')
          fi
          
          echo "Manifest RAW URL: $RAW_PLIST_URL"
          OTA_INSTALL_URL="itms-services://?action=download-manifest&url=$RAW_PLIST_URL"
          
          # 2. Tạo file install.html - Sẽ được upload thẳng lên GitHub Release cùng với file IPA
          cat <<EOF > $RUNNER_TEMP/install.html
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Cài đặt ứng dụng iOS</title>
              <style>
                  body { font-family: -apple-system, sans-serif; text-align: center; padding-top: 60px; color: #333; background-color: #f5f5f7; }
                  .container { max-width: 90%; margin: 0 auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
                  .btn { display: inline-block; padding: 14px 28px; background: #007aff; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 25px; box-shadow: 0 2px 5px rgba(0,122,255,0.3); }
                  p { font-size: 15px; color: #666; line-height: 1.5; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h2>Đang kích hoạt trình cài đặt iOS...</h2>
                  <p>Hệ thống sẽ tự động hiện pop-up hỏi <b>"Bạn có muốn cài đặt không?"</b> trong vài giây.</p>
                  <p>Nếu không thấy hiện tượng gì, hãy nhấn nút màu xanh dưới đây (Yêu cầu bắt buộc mở bằng Safari).</p>
                  <a href="$OTA_INSTALL_URL" class="btn">Bấm vào đây để cài đặt</a>
              </div>
              <script>
                  window.location.href = "$OTA_INSTALL_URL";
              </script>
          </body>
          </html>
          EOF

          # Lưu các thông tin đường dẫn ra môi trường GitHub Biến
          echo "FINAL_HTTPS_LINK=$GITHUB_HTML_URL" >> $GITHUB_ENV
          
          # Mã hóa link HTML chính chủ của GitHub để sinh mã QR
          ENCODED_URL=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$GITHUB_HTML_URL'''))")
          QR_IMAGE_URL="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=$ENCODED_URL"
          echo "OTA_QR_URL=$QR_IMAGE_URL" >> $GITHUB_ENV

      # Đẩy cả file IPA và file install.html lên GitHub Releases
      - name: Create or Update Pre-release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: "${{ runner.temp }}/*-signed.ipa,${{ runner.temp }}/install.html"
          tag: "dhphuc-ios"
          name: "${{ github.sha }}"
          body: |
            ### 🚀 iOS Build Details
            - **Commit SHA:** `${{ github.sha }}`
            - **Branch:** `${{ github.ref_name }}`
            
            ### 🔗 Direct OTA Install (Dành cho Safari trên iPhone)
            Nhấn trực tiếp vào liên kết bên dưới, trang web đệm lưu trên GitHub sẽ tự mở và gọi pop-up cài đặt ứng dụng:
            
            👉 **[BẤM VÀO ĐÂY ĐỂ CÀI ĐẶT ỨNG DỤNG](${{ env.FINAL_HTTPS_LINK }})**
            
            ---
            
            ### 📲 Scan QR Code to Install (Quét từ thiết bị khác)
            Mở ứng dụng Camera trên iPhone để quét mã dưới đây:
            
            ![Scan to Install](${{ env.OTA_QR_URL }})
            
            *Lưu ý: File cài đặt trang đệm HTML hiện tại được phân phối chính chủ bởi hạ tầng GitHub, đảm bảo hiển thị đúng giao diện web 100%.*
          prerelease: true
          makeLatest: false
          token: ${{ secrets.GITHUB_TOKEN }}
          
